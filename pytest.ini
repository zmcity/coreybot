[pytest]
testpaths = tests coreybot
asyncio_mode = auto
# This machine's %TEMP% and workspace cache dirs are locked down by security
# software, so disable pytest's on-disk cache to avoid PermissionError noise.
addopts = -p no:cacheprovider
markers =
    integration: cross-component tests (TUI, chat loop, live-style HTTP)
filterwarnings =
    ignore::DeprecationWarning